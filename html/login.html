<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pistas Deportivas San Isidro</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="caja-login">
        <div class="caja-logo">
            <img src="../img/logo.png" alt="Logo Reserva Pista San Isidro" class="logo">
        </div>

        <h2>Acceso a Pistas Deportivas</h2>
        
        <form action="/html/principal.html" method="POST">
            <div class="inputs">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Ingrese su email">
            </div>

            <div class="inputs">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
            </div>

            <div class="botones-rrss">
                <button type="button" class="btn-google">
                    <i class="google"></i> Google
                </button>
                <button type="button" class="btn-facebook">
                    <i class="facebook"></i> Facebook
                </button>
            </div>

            <button type="submit" class="btn-sesion">Iniciar Sesión</button>
            
            <div class="links">
                <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
                <span class="separator">|</span>
                <a href="registro.html">Regístrate aquí</a>
            </div>
        </form>
    </div>

</body>
</html>
